{% extends "base.html" %}

{% block title %}會員登入{% endblock %}

{% block content %}
<article>
    <h2>會員登入</h2>
    <form action="{{ url_for('login_route') }}" method="POST">
        <label>Email
            <input type="email" name="email" required>
        </label>

        <label>密碼
            <input type="password" name="password" required>
        </label>

        <button type="submit">登入</button>
    </form>
</article>
{% endblock %}
