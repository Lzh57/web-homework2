{% extends "base.html" %}

{% block title %}會員註冊{% endblock %}

{% block content %}
<article>
    <h2>會員註冊</h2>
    <form action="{{ url_for('register_route') }}" method="POST">
        <label>帳號
            <input type="text" name="username" required>
        </label>

        <label>Email
            <input type="email" name="email" required>
        </label>

        <label>密碼
            <input type="password" name="password" required>
        </label>

        <label>電話 (選填)
            <input type="text" name="phone" placeholder="09XXXXXXXX">
        </label>

        <label>出生日期
            <input type="date" name="birthdate" required>
        </label>

        <button type="submit">送出註冊</button>
    </form>
</article>
{% endblock %}
